<!DOCTYPE html>
<html>
<head>
    <title>Unordered List Example</title>
</head>
<body>

<ul type="disc">
    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
</ul>
<br>

<ul type="circle">
    <li>Cat</li>
    <li>Dog</li>
    <li>Elephant</li>
</ul>
<br>

<ul type="square">
    <li>Red</li>
    <li>Green</li>
    <li>Blue</li>
</ul>

</body>
</html>
