<!DOCTYPE html>
<html>
<head>
    <title>Inline CSS Example</title>
</head>
<body>

<form>
    <input type="text" placeholder="Name" style="background-color: lightyellow; border: 2px solid orange;">
    <br><br>
    <input type="email" placeholder="Email" style="background-color: lightblue; border: 2px solid blue;">
    <br><br>
    <input type="submit" value="Submit" style="background-color: lightgreen; border: none; padding: 5px;">
</form>

</body>
</html>
