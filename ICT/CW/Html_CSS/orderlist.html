<!DOCTYPE html>
<html>
<head>
    <title>Ordered List Example</title>
</head>
<body>

<ol type="1">
    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
</ol>
<br>

<ol type="A">
    <li>Cat</li>
    <li>Dog</li>
    <li>Elephant</li>
</ol>
<br>

<ol type="a">
    <li>Red</li>
    <li>Green</li>
    <li>Blue</li>
</ol>
<br>

<ol type="I">
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
</ol>
<br>

<ol type="i">
    <li>Pen</li>
    <li>Pencil</li>
    <li>Marker</li>
</ol>

</body>
</html>
